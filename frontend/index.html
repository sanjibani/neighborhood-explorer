<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neighborhood Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="min-h-screen">
  <!-- Single mount point. app.js picks which screen to render based on the URL hash. -->
  <div id="app"></div>

  <!-- Load order matters: api -> components -> screens -> app (app bootstraps everything). -->
  <script type="module" src="/api.js"></script>
  <script type="module" src="/components.js"></script>
  <script type="module" src="/screens.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
