name: CI

on:
  push:
    branches: [main, phase-*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: pytest tests/ -v

      # Phase 5 expansion: add Playwright E2E, visual regression, a11y tests.
      # Phase 6 expansion: add Render deploy hook.